<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continuum</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0a'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%236ee7b7'%3E%E2%97%88%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/style.css?v=14" />
</head>
<body>
  <header class="topbar">
    <button class="iconbtn menu" id="menu-btn" title="Menu" aria-label="Menu">☰</button>
    <div class="brand"><span class="logo">◈</span><span class="name">Continuum</span></div>
    <div class="omni">
      <span class="omni-ic">⌕</span>
      <input id="omni" type="search" placeholder="Search your chats, or ask anything…" />
    </div>
    <button class="iconbtn" id="settings-btn" title="Settings" aria-label="Settings">⚙</button>
  </header>

  <div id="update-bar" class="update-bar" hidden></div>

  <main class="layout">
    <aside class="sidebar">
      <button id="new-btn" class="btn primary wide">+ Add a chat</button>
      <button id="compare-btn" class="btn wide" style="margin-top:8px">Compare answers</button>
      <button id="memory-btn" class="btn wide" style="margin-top:6px">Your memory</button>
      <div class="list-head">Your chats <span id="conv-count" class="muted"></span></div>
      <div id="conv-list" class="conv-list"></div>
      <div class="trust"><span title="Your chats stay on your computer; Continuum only connects to check for updates">Private — your chats stay on your computer</span></div>
    </aside>

    <section class="content" id="content">
      <div id="home-view" class="view"></div>
      <div id="conv-view" class="view" hidden></div>
      <div id="search-view" class="view" hidden></div>
      <div id="paste-view" class="view" hidden></div>
      <div id="onboarding-view" class="view" hidden></div>
      <div id="settings-view" class="view" hidden></div>
      <div id="compare-view" class="view" hidden></div>
      <div id="memory-view" class="view" hidden></div>
    </section>
  </main>

  <div id="scrim" class="scrim" hidden></div>
  <input type="file" id="file-input" accept=".json,.txt" hidden />
  <div id="toast" class="toast" hidden></div>
  <script src="/static/app.js?v=14"></script>
</body>
</html>
