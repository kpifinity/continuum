name: Build Windows installer

# Push a version tag (e.g. v0.1.0) and this builds Continuum-Setup.exe on a
# Windows runner, then publishes it as an asset on that tag's GitHub Release.
# You can also run it manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # allows the job to create/update the Release and upload assets

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app + build deps
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller pytest httpx

      - name: Run tests
        run: python -m pytest -q

      - name: Build Continuum.exe (PyInstaller)
        run: python packaging/build.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer (Inno Setup)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss'

      - name: Publish installer to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/Continuum-Setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
