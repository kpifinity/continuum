name: Build installers

# Push a version tag (e.g. v0.1.0) or click "Run workflow" to build the
# Windows installer AND the macOS app, and publish both to the tag's Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller pytest httpx
      - name: Test
        run: python -m pytest -q
      - name: Build Continuum.exe (PyInstaller)
        run: python packaging/build.py
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Compile installer
        run: '& "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe" packaging\\installer.iss'
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/Continuum-Setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller
      - name: Build Continuum.app (PyInstaller)
        run: |
          pyinstaller --noconfirm --clean --windowed --name Continuum \
            --collect-data ski_memory \
            --collect-submodules uvicorn --collect-submodules anyio \
            --hidden-import ski_memory \
            packaging/run_ski_memory.py
      - name: Package .dmg
        run: |
          hdiutil create -volname "Continuum" \
            -srcfolder "dist/Continuum.app" -ov -format UDZO \
            "dist/Continuum-macOS.dmg"
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Continuum-macOS.dmg
          fail_on_unmatched_files: true
